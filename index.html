<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - SIAP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a2a6c; --bg: #f4f7f9; --white: #fff; --accent: #fdbb2d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        .header p { margin: 10px 0 0 0; opacity: 0.8; font-size: 0.9rem; }

        .container { max-width: 800px; margin: -30px auto 40px; padding: 0 20px; }
        
        /* Tarjeta de Selección de Puente */
        .setup-card { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .setup-card h2 { color: var(--primary); font-size: 1.2rem; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background: #f8fafc; }
        
        .bridge-info-preview { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: #f1f5f9; padding: 15px; border-radius: 12px; margin-top: 15px;
            border-left: 4px solid var(--accent);
        }
        .info-item span { display: block; font-size: 0.75rem; color: #64748b; text-transform: uppercase; }
        .info-item strong { font-size: 0.9rem; color: var(--primary); }

        /* Menú de Módulos */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .menu-item { 
            background: var(--white); padding: 25px; border-radius: 20px; text-align: center;
            text-decoration: none; color: var(--primary); transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #edf2f7;
        }
        .menu-item:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-color: var(--accent); }
        .menu-item i { font-size: 2.2rem; margin-bottom: 15px; color: var(--accent); }
        .menu-item span { display: block; font-weight: bold; font-size: 1rem; }
        
        .btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>SISTEMA SIAP</h1>
    <p>Gestión de Inspección Estructural de Puentes</p>
</div>

<div class="container">
    <div class="setup-card">
        <h2><i class="fas fa-bridge"></i> Configuración de Trabajo</h2>
        <div class="form-group">
            <label>Seleccionar Puente (Número de Inventario)</label>
            <select id="bridge-selector" onchange="updateBridgeData()">
                <option value="">-- Seleccione un puente --</option>
                <option value="1">1 - PIPR 129+955</option>
                <option value="2">2 - Puente Central - CD VALLES</option>
                <option value="3">3 - Puente El Naranjo</option>
            </select>
        </div>

        <div id="bridge-preview" style="display: none;">
            <div class="bridge-info-preview">
                <div class="info-item"><span>Estado</span><strong id="p-estado">---</strong></div>
                <div class="info-item"><span>Municipio</span><strong id="p-municipio">---</strong></div>
                <div class="info-item"><span>Localidad</span><strong id="p-localidad">---</strong></div>
                <div class="info-item"><span>Responsable</span><strong id="p-responsable">Ing. Residente</strong></div>
            </div>
        </div>
    </div>

    <div class="menu-grid">
        <a href="inspeccion.html" class="menu-item btn-disabled" id="link-inspeccion">
            <i class="fas fa-clipboard-check"></i>
            <span>Levantamiento</span>
        </a>
        <a href="calificacion.html" class="menu-item">
            <i class="fas fa-star"></i>
            <span>Calificación</span>
        </a>
        <a href="reportes.html" class="menu-item">
            <i class="fas fa-file-pdf"></i>
            <span>Informes</span>
        </a>
    </div>
</div>

<script>
    // Base de datos de puentes extraída de tu formato oficial
    const puentesDB = {
        "1": {
            nombre: "PIPR 129+955",
            estado: "SAN LUIS POTOSI",
            municipio: "RIOVERDE-CD VALLES",
            localidad: "RIOVERDE",
            responsable: "SCT - SIAP"
        },
        "2": {
            nombre: "Puente Central",
            estado: "SAN LUIS POTOSI",
            municipio: "CIUDAD VALLES",
            localidad: "CENTRO",
            responsable: "SCT - SIAP"
        }
    };

    function updateBridgeData() {
        const id = document.getElementById('bridge-selector').value;
        const preview = document.getElementById('bridge-preview');
        const linkInspeccion = document.getElementById('link-inspeccion');

        if (id && puentesDB[id]) {
            const p = puentesDB[id];
            document.getElementById('p-estado').innerText = p.estado;
            document.getElementById('p-municipio').innerText = p.municipio;
            document.getElementById('p-localidad').innerText = p.localidad;
            
            preview.style.display = 'block';
            linkInspeccion.classList.remove('btn-disabled');

            // Guardamos en sessionStorage para que inspeccion.html lo recupere
            sessionStorage.setItem('current_bridge', JSON.stringify({id, ...p}));
        } else {
            preview.style.display = 'none';
            linkInspeccion.classList.add('btn-disabled');
        }
    }

    // Al cargar, limpiar selección previa para forzar seguridad
    window.onload = () => {
        sessionStorage.removeItem('current_bridge');
    };
</script>

</body>
</html>
