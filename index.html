<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIAP - Panel de Control</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 50px; }
        .menu { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: #34495e; padding: 20px; border-radius: 10px; width: 200px; cursor: pointer; transition: 0.3s; border: 1px solid #5d6d7e; }
        .card:hover { background: #1abc9c; transform: translateY(-5px); }
        .folio-box { margin-bottom: 20px; font-size: 1.2em; color: #1abc9c; }
    </style>
</head>
<body>
    <h1>SISTEMA DE ADMINISTRACIÓN DE PUENTES (SIAP)</h1>
    <div class="folio-box">FOLIO ACTUAL: <span id="current-folio">GENERANDO...</span></div>
    
    <div class="menu">
        <div class="card" onclick="location.href='calificacion.html'">
            <h3>1. DATOS Y CALIFICACIÓN</h3>
            <p>Páginas 1 a 7</p>
        </div>
        <div class="card" onclick="location.href='inspeccion.html'">
            <h3>2. FOTOGRAFÍAS</h3>
            <p>Página 9 - Evidencias</p>
        </div>
        <div class="card" onclick="location.href='reporte.html'">
            <h3>3. GENERAR REPORTE</h3>
            <p>Exportar PDF Identico</p>
        </div>
    </div>

    <script>
        // Generación de Folio único para vinculación de datos/fotos
        if(!localStorage.getItem('currentFolio')) {
            const folio = "ICA-" + Math.floor(Math.random()*10000);
            localStorage.setItem('currentFolio', folio);
        }
        document.getElementById('current-folio').innerText = localStorage.getItem('currentFolio');
    </script>
</body>
</html>
