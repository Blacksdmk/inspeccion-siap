<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIAP - Inspección de Campo</title>
    <style>
        body { background: #eaeaea; font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; color: #333; }
        .control-bar { max-width: 900px; margin: auto; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sheet { background: white; width: 900px; margin: auto; padding: 40px; box-shadow: 0 0 15px rgba(0,0,0,0.15); border-radius: 4px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #1a252f; padding-bottom: 15px; margin-bottom: 25px; }
        .section { border: 1px solid #1a252f; margin-bottom: 20px; border-radius: 4px; overflow: hidden; }
        .section-title { background: #1a252f; color: white; font-weight: bold; padding: 10px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        .row { display: flex; border-bottom: 1px solid #e0e0e0; }
        .row:last-child { border-bottom: none; }
        .field { padding: 12px; flex: 1; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
        .field:last-child { border-right: none; }
        label { font-size: 10px; color: #2980b9; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
        input, select { border: 1px solid #bdc3c7; border-radius: 4px; padding: 6px; font-size: 13px; outline: none; background: #fff; }
        input[readonly] { background: #f5f7f8; color: #7f8c8d; border-color: #e2e5e7; }
        
        /* Contenedor Fotográfico */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 15px; }
        .photo-card { border: 1px solid #bdc3c7; border-radius: 6px; padding: 15px; background: #fcfcfc; text-align: center; }
        .photo-preview { width: 100%; height: 180px; border: 2px dashed #bdc3c7; border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; background: #f8f9fa; background-size: cover; background-position: center; font-size: 0.9em; color: #7f8c8d; }
        
        /* Botones */
        .btn { padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; border: none; font-size: 0.9em; text-decoration: none; display: inline-block; }
        .btn-back { background: #7f8c8d; color: white; }
        .btn-db { background: #3498db; color: white; }
        .btn-submit { background: #27ae60; color: white; font-size: 16px; padding: 15px 40px; display: block; margin: 30px auto 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-submit:hover { background: #219653; }
        
        /* Ventana Modal de Carga */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 6px; width: 600px; max-width: 90%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .db-status { font-size: 0.85em; color: #555; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="control-bar">
    <a href="index.html" class="btn btn-back">← Volver al Panel</a>
    <div>
        <span id="db-indicator" class="db-status" style="margin-right: 15px; color: #c0392b;">⚠️ Sin Base de Datos</span>
        <button class="btn btn-db" onclick="abrirModal()">⚙️ Cargar/Actualizar Puentes desde Excel</button>
    </div>
</div>

<div class="sheet">
    <div class="header">
        <div style="font-weight: bold; font-size: 1.2em; color: #1a252f;">FOLIO: <span id="lbl-folio" style="color: #e67e22;">-</span></div>
        <div style="text-align: center;">
            <h2 style="margin: 0; font-size: 1.5em; color: #1a252f;">SISTEMA DE ADMINISTRACIÓN DE PUENTES</h2>
            <h4 style="margin: 5px 0 0 0; color: #7f8c8d; font-style: italic;">Registro Integrado de Datos de Campo</h4>
        </div>
        <div style="font-weight: bold; font-size: 1.1em; color: #34495e;">LIBRAMIENTO ICA</div>
    </div>

    <div class="section">
        <div class="section-title">1. Identificación y Ubicación del Activo</div>
        <div class="row">
            <div class="field" style="background: #edf2f7;">
                <label>(003) NÚMERO DE PUENTE / CADENAMIENTO</label>
                <input type="text" id="v003" placeholder="Ej: 1 o 125" oninput="autocompletarCamposPuente(this.value)">
            </div>
            <div class="field">
                <label>Fecha de Inspección</label>
                <input type="text" id="txt-fecha" readonly>
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>(002) NOMBRE DE LA ESTRUCTURA</label>
