<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAP - Levantamiento de Daños</title>
    <style>
        :root { --siap-navy: #2c3e50; --siap-accent: #3498db; --border: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .header { border-bottom: 2px solid var(--siap-navy); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .section-title { background: var(--siap-navy); color: white; padding: 10px 15px; border-radius: 4px; font-weight: bold; margin-bottom: 15px; }

        /* Contenedor de Evidencia */
        .damage-card { border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; display: grid; grid-template-columns: 200px 1fr; gap: 20px; background: #fff; }
        .photo-upload { width: 200px; height: 150px; border: 2px dashed var(--siap-accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        .damage-info { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 0.85em; font-weight: bold; color: var(--siap-navy); }
        select, textarea { padding: 8px; border: 1px solid var(--border); border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        .btn-add { background: var(--siap-accent); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 1.1em; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>LEVANTAMIENTO DE DAÑOS Y EVIDENCIA</h2>
        <span id="bridge-tag" style="font-weight: bold; color: var(--siap-accent);">PUENTE: ---</span>
    </div>

    <div class="section-title">REGISTRO FOTOGRÁFICO DE PATOLOGÍAS</div>
    
    <div id="damage-container">
        <div class="damage-card">
            <div class="photo-upload" onclick="triggerUpload(this)">
                <span>+ Añadir Foto</span>
                <input type="file" accept="image/*" style="display:none" onchange="previewImage(this)">
            </div>
            <div class="damage-info">
                <div>
                    <label>ELEMENTO AFECTADO</label>
                    <select class="el-select">
                        <option>Superficie de Rodamiento</option>
                        <option>Trabes / Vigas</option>
                        <option>Pilas / Estribos</option>
                        <option>Apoyos</option>
                    </select>
                </div>
                <div>
                    <label>TIPO DE DAÑO / OBSERVACIÓN TÉCNICA</label>
                    <textarea rows="3" placeholder="Ej: Grieta longitudinal de 3mm, desprendimiento de concreto, corrosión en acero de refuerzo..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-add" onclick="addNewDamage()">+ AGREGAR OTRO DAÑO</button>
    <button class="btn-save" onclick="saveInspeccion()">FINALIZAR LEVANTAMIENTO</button>
</div>

<script>
    function triggerUpload(el) {
        el.querySelector('input').click();
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            const parent = input.parentElement;
            reader.onload = (e) => {
                parent.innerHTML = `<img src="${e.target.result}"> <input type="file" style="display:none">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addNewDamage() {
        const container = document.getElementById('damage-container');
        const newCard = container.firstElementChild.cloneNode(true);
        newCard.querySelector('.photo-upload').innerHTML = '<span>+ Añadir Foto</span><input type="file" accept="image/*" style="display:none" onchange="previewImage(this)">';
        newCard.querySelector('textarea').value = '';
        container.appendChild(newCard);
    }

    function saveInspeccion() {
        alert("Sincronizando galería de daños con el expediente del puente...");
        // Lógica para subir imágenes a Firebase Storage y metadatos a Firestore
    }
</script>

</body>
</html>
