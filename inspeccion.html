<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAP - Levantamiento de Evidencia</title>
    <style>
        :root { --siap-navy: #2c3e50; --siap-accent: #3498db; --danger: #e74c3c; --border: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .header { border-bottom: 2px solid var(--siap-navy); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .session-info { font-size: 0.85em; background: #eef2f7; padding: 10px; border-radius: 5px; border: 1px solid var(--siap-accent); }

        .damage-card { 
            border: 1px solid var(--border); border-radius: 8px; padding: 15px; 
            margin-bottom: 20px; display: grid; grid-template-columns: 220px 1fr; 
            gap: 20px; background: #fff; position: relative; 
        }
        
        /* Botón Eliminar Daño */
        .btn-remove { 
            position: absolute; top: -10px; right: -10px; background: var(--danger); 
            color: white; border: none; border-radius: 50%; width: 25px; height: 25px; 
            cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .photo-upload { 
            width: 200px; height: 160px; border: 2px dashed var(--siap-accent); 
            border-radius: 6px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; overflow: hidden; background: #f9f9f9;
        }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }
        
        .damage-info { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 0.8em; font-weight: bold; color: var(--siap-navy); }
        select, textarea { padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.9em; }

        .controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn-add { background: var(--siap-accent); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; flex: 1; font-weight: bold; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; flex: 2; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>LEVANTAMIENTO DE EVIDENCIA (FOTOS)</h2>
        <div class="session-info">
            <strong>ID REPORTE:</strong> <span id="folio-link">---</span><br>
            <strong>PUENTE:</strong> <span id="bridge-name">No seleccionado</span>
        </div>
    </div>

    <div id="damage-container">
        </div>

    <div class="controls">
        <button class="btn-add" onclick="addNewDamage()">+ AGREGAR OTRO DAÑO</button>
        <button class="btn-save" onclick="syncWithReport()">VINCULAR Y GUARDAR TODO</button>
    </div>
</div>

<script>
    // ELEMENTOS OFICIALES PARA VINCULAR
    const ELEMENTOS = ["Superficie de Rodamiento", "Subestructura", "Superestructura", "Apoyos", "Cauce", "Otros"];

    // 1. ¿CÓMO SABEMOS A QUÉ REPORTE PERTENECE?
    // Recuperamos el ID del puente y el Folio de la sesión actual (guardados en Calificacion.html)
    document.addEventListener('DOMContentLoaded', () => {
        const currentBridge = localStorage.getItem('currentBridgeID') || "S/N";
        const currentFolio = localStorage.getItem('currentFolio') || "TEMP-" + Date.now();
        
        document.getElementById('bridge-name').innerText = currentBridge;
        document.getElementById('folio-link').innerText = currentFolio;
        
        addNewDamage(); // Crear el primer espacio automáticamente
    });

    function addNewDamage() {
        const container = document.getElementById('damage-container');
        const card = document.createElement('div');
        card.className = 'damage-card';
        card.innerHTML = `
            <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
            <div class="photo-upload" onclick="this.querySelector('input').click()">
                <span>+ Cargar Foto</span>
                <input type="file" accept="image/*" style="display:none" onchange="preview(this)">
            </div>
            <div class="damage-info">
                <div>
                    <label>ELEMENTO DEL REPORTE</label>
                    <select class="sel-elemento">
                        ${ELEMENTOS.map(e => `<option>${e}</option>`).join('')}
                    </select>
                </div>
                <div>
                    <label>DESCRIPCIÓN DEL DAÑO (OBSERVACIONES)</label>
                    <textarea rows="3" placeholder="Describa la falla detectada..."></textarea>
                </div>
            </div>
        `;
        container.appendChild(card);
    }

    function preview(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const container = input.parentElement;
                container.innerHTML = `<img src="${e.target.result}"><input type="file" style="display:none" onchange="preview(this)">`;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 2. INTEGRACIÓN AL REPORTE (LÓGICA TIPO EXCEL)
    function syncWithReport() {
        const folio = document.getElementById('folio-link').innerText;
        const bridge = document.getElementById('bridge-name').innerText;
        const damages = [];

        document.querySelectorAll('.damage-card').forEach(card => {
            damages.push({
                elemento: card.querySelector('.sel-elemento').value,
                nota: card.querySelector('textarea').value,
                // En producción aquí se enviaría el archivo a Firebase Storage
            });
        });

        console.log(`Vinculando ${damages.length} fotos al folio ${folio}`);
        alert(`Sincronización Exitosa.\nLas imágenes han sido vinculadas al Reporte Escrito: ${folio}`);
        
        // Redirigir al reporte final
        // window.location.href = "reporte.html";
    }
</script>
</body>
</html>
