<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levantamiento Físico - SIAP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a2a6c; --bg: #f4f7f9; --white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .header-nav { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { text-decoration: none; color: var(--primary); font-weight: bold; }
        
        .card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--primary); font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d9e0; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .photo-area { 
            border: 2px dashed #b2bec3; 
            padding: 30px; 
            text-align: center; 
            border-radius: 15px; 
            cursor: pointer;
            background: #f8fafc;
            transition: all 0.3s;
        }
        .photo-area:hover { border-color: var(--primary); background: #edf2f7; }
        
        #preview-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 12px; 
            margin-top: 20px; 
        }
        .img-wrapper { position: relative; }
        .img-preview { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
        
        .btn-submit { 
            background: var(--primary); 
            color: white; 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin-top: 25px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:disabled { background: #a0aec0; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header-nav">
    <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i> Volver al Panel</a>
</div>

<div class="card">
    <h2 style="margin-top:0; color: var(--primary); text-align: center;">Nueva Inspección</h2>
    
    <div class="form-group">
        <label>Nombre del Puente / Estructura</label>
        <input type="text" id="bridge-name" placeholder="Ej. Puente Coatzacoalcos I">
    </div>
    
    <div class="form-group">
        <label>Parte de la Estructura</label>
        <select id="element-type">
            <option value="Subestructura">Subestructura (Pilas, Estribos, Cimentación)</option>
            <option value="Superestructura">Superestructura (Trabes, Diafragmas, Losas)</option>
            <option value="Cuerpo de Rodamiento">Superficie (Carpeta, Juntas, Drenaje)</option>
            <option value="Otros">Elementos de Protección / Señalización</option>
        </select>
    </div>

    <div class="form-group">
        <label>Descripción del Hallazgo</label>
        <textarea id="description" rows="3" placeholder="Detalle grietas, corrosión, deformaciones, etc."></textarea>
    </div>

    <div class="photo-area" onclick="document.getElementById('photo-input').click()">
        <i class="fas fa-cloud-upload-alt" style="font-size: 2.5rem; color: #636e72;"></i>
        <p style="margin-top:10px; font-weight:600;">Tomar foto o subir evidencia</p>
        <input type="file" id="photo-input" accept="image/*" capture="environment" multiple style="display:none" onchange="previewImages()">
    </div>

    <div id="preview-container"></div>

    <button class="btn-submit" id="btn-save" onclick="processAndSave()">
        <i class="fas fa-save"></i> Guardar en Sistema
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC0IuDhRe470w5WL8Fb-YOMMJPc5B8-bt8",
      authDomain: "siap-inspecciones.firebaseapp.com",
      projectId: "siap-inspecciones",
      storageBucket: "siap-inspecciones.firebasestorage.app",
      messagingSenderId: "285150830693",
      appId: "1:285150830693:web:1053b0b81d42fcf64b668c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CLOUD_NAME = "dasoefwk9";
    const UPLOAD_PRESET = "siap_preset";

    window.previewImages = () => {
        const preview = document.getElementById('preview-container');
        const files = document.getElementById('photo-input').files;
        preview.innerHTML = "";
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper';
                wrapper.innerHTML = `<img src="${e.target.result}" class="img-preview">`;
                preview.appendChild(wrapper);
            }
            reader.readAsDataURL(file);
        });
    };

    window.processAndSave = async () => {
        const btn = document.getElementById('btn-save');
        const name = document.getElementById('bridge-name').value;
        const element = document.getElementById('element-type').value;
        const desc = document.getElementById('description').value;
        const files = document.getElementById('photo-input').files;

        if(!name || files.length === 0) {
            alert("❌ Ingrese el nombre del puente y capture evidencia fotográfica.");
            return;
        }

        try {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Subiendo imágenes...';
            
            // OPTIMIZACIÓN: Subida paralela
            const uploadPromises = Array.from(files).map(async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                formData.append('quality', 'auto:eco'); // Compresión inteligente

                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                return data.secure_url;
            });

            const imageUrls = await Promise.all(uploadPromises);

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Guardando datos...';

            await addDoc(collection(db, "inspecciones"), {
                puente: name,
                elemento: element,
                hallazgo: desc,
                fotos: imageUrls,
                fecha: new Date().toLocaleString(),
                estado: "Pendiente"
            });

            alert("✅ Inspección registrada correctamente.");
            window.location.href = "index.html";

        } catch (e) {
            console.error(e);
            alert("❌ Error al guardar la inspección.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Guardar en Sistema';
        }
    };
</script>
</body>
</html>
