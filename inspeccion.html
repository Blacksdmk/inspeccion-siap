<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levantamiento Físico - SIAP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1a2a6c; --bg: #f4f7f9; --white: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d9e0; border-radius: 10px; box-sizing: border-box; }
        
        /* Estilos de la Barra de Progreso */
        .progress-container { display: none; margin-top: 20px; background: #e2e8f0; border-radius: 10px; overflow: hidden; height: 20px; }
        .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s ease; }
        #progress-text { display: none; text-align: center; font-size: 0.8rem; font-weight: bold; margin-top: 5px; color: var(--primary); }

        .photo-area { border: 2px dashed #b2bec3; padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; background: #f8fafc; }
        
        /* Contenedor de miniaturas con botón de eliminar */
        #preview-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 20px; }
        .img-wrapper { position: relative; display: inline-block; }
        .img-preview { width: 100%; height: 110px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
        .btn-remove {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .btn-submit { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; margin-top: 25px; cursor: pointer; }
        .btn-submit:disabled { background: #a0aec0; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; color: var(--primary); text-align: center;">Nueva Inspección</h2>
    
    <div class="form-group">
        <label>Nombre del Puente</label>
        <input type="text" id="bridge-name" placeholder="Ej. Puente Coatzacoalcos I">
    </div>
    
    <div class="form-group">
        <label>Parte de la Estructura</label>
        <select id="element-type">
            <option value="Subestructura">Subestructura</option>
            <option value="Superestructura">Superestructura</option>
            <option value="Cuerpo de Rodamiento">Vialidad</option>
        </select>
    </div>

    <div class="form-group">
        <label>Descripción</label>
        <textarea id="description" rows="2"></textarea>
    </div>

    <div class="photo-area" onclick="document.getElementById('photo-input').click()">
        <i class="fas fa-camera" style="font-size: 2rem;"></i>
        <p>Capturar Fotos</p>
        <input type="file" id="photo-input" accept="image/*" capture="environment" multiple style="display:none" onchange="previewImages()">
    </div>

    <div id="preview-container"></div>

    <div class="progress-container" id="p-container">
        <div class="progress-bar" id="p-bar"></div>
    </div>
    <div id="progress-text">Subiendo: 0%</div>

    <button class="btn-submit" id="btn-save" onclick="processAndSave()">
        <i class="fas fa-save"></i> Guardar Inspección
    </button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC0IuDhRe470w5WL8Fb-YOMMJPc5B8-bt8",
      authDomain: "siap-inspecciones.firebaseapp.com",
      projectId: "siap-inspecciones",
      storageBucket: "siap-inspecciones.firebasestorage.app",
      messagingSenderId: "285150830693",
      appId: "1:285150830693:web:1053b0b81d42fcf64b668c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const CLOUD_NAME = "dasoefwk9";
    const UPLOAD_PRESET = "siap_preset";

    // Arreglo para manejar los archivos de forma independiente
    let selectedFiles = [];

    window.previewImages = () => {
        const fileInput = document.getElementById('photo-input');
        const newFiles = Array.from(fileInput.files);
        
        // Sumamos los archivos nuevos a los ya seleccionados
        selectedFiles = [...selectedFiles, ...newFiles];
        fileInput.value = ""; // Limpiamos el input para permitir re-selección
        renderPreviews();
    };

    window.removeImage = (index) => {
        selectedFiles.splice(index, 1);
        renderPreviews();
    };

    function renderPreviews() {
        const preview = document.getElementById('preview-container');
        preview.innerHTML = "";
        
        selectedFiles.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper';
                wrapper.innerHTML = `
                    <img src="${e.target.result}" class="img-preview">
                    <div class="btn-remove" onclick="removeImage(${index})">
                        <i class="fas fa-times"></i>
                    </div>
                `;
                preview.appendChild(wrapper);
            }
            reader.readAsDataURL(file);
        });
    }

    const uploadWithProgress = (file) => {
        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, true);

            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    updateProgressBar(percentComplete);
                }
            };

            xhr.onload = () => {
                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    resolve(response.secure_url);
                } else {
                    reject('Error en subida');
                }
            };

            xhr.onerror = () => reject('Error de conexión');
            xhr.send(formData);
        });
    };

    function updateProgressBar(percent) {
        const bar = document.getElementById('p-bar');
        const text = document.getElementById('progress-text');
        bar.style.width = percent + '%';
        text.innerText = `Subiendo evidencia: ${percent}%`;
    }

    window.processAndSave = async () => {
        const btn = document.getElementById('btn-save');
        const pContainer = document.getElementById('p-container');
        const pText = document.getElementById('progress-text');

        if(selectedFiles.length === 0) return alert("Capture fotos.");

        try {
            btn.disabled = true;
            pContainer.style.display = 'block';
            pText.style.display = 'block';
            
            const imageUrls = [];
            for(let i=0; i < selectedFiles.length; i++) {
                pText.innerText = `Subiendo foto ${i+1} de ${selectedFiles.length}...`;
                const url = await uploadWithProgress(selectedFiles[i]);
                imageUrls.push(url);
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando registro...';
            await addDoc(collection(db, "inspecciones"), {
                puente: document.getElementById('bridge-name').value,
                elemento: document.getElementById('element-type').value,
                hallazgo: document.getElementById('description').value,
                fotos: imageUrls,
                fecha: new Date().toLocaleString(),
                estado: "Pendiente"
            });

            alert("✅ Guardado correctamente.");
            window.location.href = "index.html";

        } catch (e) {
            console.error(e);
            alert("❌ Error al guardar.");
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Guardar Inspección';
        }
    };
</script>
</body>
</html>
