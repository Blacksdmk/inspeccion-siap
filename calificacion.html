function autocompletarPuente(id) {
    const puente = DB_PUENTES[id];
    
    // Elementos del DOM a manipular
    const campoNombre = document.getElementById('v002');
    const campoEstado = document.getElementById('v004');
    const campoMunicipio = document.getElementById('v005');
    const campoLocalidad = document.getElementById('v006');

    if (puente) {
        // Asignación de datos directos
        campoNombre.value = puente.nombre;
        campoEstado.value = puente.estado;

        // Procesamiento del campo unificado 'municipio_localidad'
        if (puente.municipio_localidad && puente.municipio_localidad.includes(" / ")) {
            const partes = puente.municipio_localidad.split(" / ");
            campoMunicipio.value = partes[0] ? partes[0].trim() : "";
            campoLocalidad.value = partes[1] ? partes[1].trim() : "";
        } else {
            campoMunicipio.value = puente.municipio_localidad || "";
            campoLocalidad.value = "";
        }
        
        // Registro de auditoría interno
        console.log(`Sistema Raphael: Datos del puente ${id} cargados con éxito.`);
        localStorage.setItem('currentBridgeID', id);
    } else {
        // Limpieza absoluta por ID inexistente o vacío
        campoNombre.value = "";
        campoEstado.value = "";
        campoMunicipio.value = "";
        campoLocalidad.value = "";
    }
}

// Rellenar fecha automáticamente al cargar
window.onload = () => {
    const hoy = new Date();
    document.getElementById('fecha_actual').value = hoy.toLocaleDateString('es-MX');
};
