<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIAP - Panel de Calificación</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a252f; color: #e4e7eb; margin: 40px; }
        .container { max-width: 1100px; margin: auto; }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #34495e; padding-bottom: 20px; margin-bottom: 30px; }
        h2 { margin: 0; color: #1abc9c; text-transform: uppercase; }
        .btn-back { background: #7f8c8d; color: white; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9em; }
        .btn-back:hover { background: #95a5a6; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #2c3e50; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #34495e; }
        th { background: #111a22; color: #1abc9c; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background: #34495e; }
        
        .status-badge { padding: 5px 10px; border-radius: 4px; font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: #e67e22; color: #fff; }
        .status-approved { background: #27ae60; color: #fff; }
        
        .btn-action { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85em; margin-right: 5px; transition: background 0.2s; }
        .btn-delete { background: #c0392b; color: white; }
        .btn-delete:hover { background: #e74c3c; }
        .btn-approve { background: #27ae60; color: white; }
        .btn-approve:hover { background: #2ecc71; }
        
        .no-data { text-align: center; padding: 40px; color: #7f8c8d; background: #2c3e50; border-radius: 6px; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-area">
            <h2>Calificación y Validación de Formularios</h2>
            <a href="index.html" class="btn-back">← Volver al Menú Principal</a>
        </div>

        <div id="tabla-vacia" class="no-data">No se han detectado formularios de inspección registrados en la memoria local.</div>
        
        <table id="tabla-registros" style="display: none;">
            <thead>
                <tr>
                    <th>Folio Único</th>
                    <th>ID Activo</th>
                    <th>Nombre de Estructura</th>
                    <th>Fecha Captura</th>
                    <th>Estado de Validación</th>
                    <th>Acciones de Control</th>
                </tr>
            </thead>
            <tbody id="lista-formularios"></tbody>
        </table>
    </div>

    <script>
        // Carga inicial al desplegar el documento
        window.onload = () => {
            cargarRegistrosLocales();
        };

        function cargarRegistrosLocales() {
            const tbody = document.getElementById('lista-formularios');
            const tabla = document.getElementById('tabla-registros');
            const mensajeVacio = document.getElementById('tabla-vacia');
            tbody.innerHTML = '';
            
            let conteoRegistros = 0;

            // Iteración sobre el total del mapa de memoria de almacenamiento
            for (let i = 0; i < localStorage.length; i++) {
                const clave = localStorage.key(i);
                
                // Filtro exclusivo por prefijo de folio de inspección estructural
                if (clave.startsWith('siap_folio_')) {
                    conteoRegistros++;
                    const datos = JSON.parse(localStorage.getItem(clave));
                    
                    const fila = document.createElement('tr');
                    fila.innerHTML = `
                        <td style="font-family: monospace; font-weight: bold; color: #1abc9c;">${datos.folio}</td>
                        <td style="font-weight: bold;">${datos.puenteId}</td>
                        <td>${datos.nombrePuente}</td>
                        <td>${datos.fecha}</td>
                        <td>
                            <span class="status-badge ${datos.aprobado ? 'status-approved' : 'status-pending'}">
                                ${datos.aprobado ? 'Aceptado' : 'Pendiente'}
                            </span>
                        </td>
                        <td>
                            ${!datos.aprobado ? `<button class="btn-action btn-approve" onclick="aprobarInspeccion('${datos.folio}')">Aceptar</button>` : ''}
                            <button class="btn-action btn-delete" onclick="eliminarInspeccion('${datos.folio}')">Borrar</button>
                        </td>
                    `;
                    tbody.appendChild(fila);
                }
            }

            // Control de renderizado de la UI basado en volumetría de datos
            if (conteoRegistros > 0) {
                tabla.style.display = 'table';
                mensajeVacio.style.display = 'none';
            } else {
                tabla.style.display = 'none';
                mensajeVacio.style.display = 'block';
            }
        }

        function aprobarInspeccion(folio) {
            const clave = 'siap_folio_' + folio;
            let registro = JSON.parse(localStorage.getItem(clave));
            if (registro) {
                registro.aprobado = true; // Transición de estado
                localStorage.setItem(clave, JSON.stringify(registro));
                cargarRegistrosLocales();
            }
        }

        function eliminarInspeccion(folio) {
            if (confirm(`Aviso crítico: ¿Está completamente seguro de eliminar permanentemente el folio ${folio}? Esta acción no se puede deshacer.`)) {
                localStorage.removeItem('siap_folio_' + folio);
                cargarRegistrosLocales();
            }
        }
    </script>
</body>
</html>
