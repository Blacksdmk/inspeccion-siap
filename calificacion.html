<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIAP - Formato de Inspección Visual</title>
    <style>
        body { background: #f0f0f0; padding: 20px; font-family: Arial, sans-serif; }
        .sheet { background: white; width: 850px; margin: auto; padding: 40px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { border-bottom: 3px solid black; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section { border: 1px solid #000; margin-bottom: 15px; }
        .section-title { background: #eee; font-weight: bold; padding: 5px; border-bottom: 1px solid #000; font-size: 13px; }
        .row { display: flex; border-bottom: 1px solid #ccc; }
        .field { padding: 10px; flex: 1; border-right: 1px solid #eee; }
        label { display: block; font-size: 10px; color: blue; font-weight: bold; text-transform: uppercase; }
        input, select, textarea { width: 100%; border: none; outline: none; font-size: 14px; margin-top: 5px; }
        .btn-float { position: fixed; bottom: 20px; right: 20px; background: #27ae60; color: white; padding: 15px 30px; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="sheet">
    <div class="header">
        <img src="logo_ica.png" width="150" alt="ICA">
        <div style="text-align:center">
            <h2 style="margin:0">SISTEMA DE ADMINISTRACIÓN DE PUENTES (SIAP)</h2>
            <h3 style="margin:0; font-style: italic;">FORMATO DE INSPECCIÓN VISUAL</h3>
        </div>
        <img src="logo_quantum.png" width="120" alt="QUANTUM">
    </div>

    <div class="section">
        <div class="section-title">1. DATOS GENERALES</div>
        <div class="row">
            <div class="field"><label>RESPONSABLE DEL PUENTE (001)</label><input type="text" id="v001"></div>
            <div class="field"><label>FECHA</label><input type="date" id="fecha"></div>
        </div>
        <div class="row">
            <div class="field"><label>NOMBRE DEL PUENTE (002)</label><input type="text" id="v002"></div>
            <div class="field"><label>NÚMERO / CADENAMIENTO (003)</label><input type="text" id="v003"></div>
        </div>
        <div class="row">
            <div class="field"><label>ESTADO (004)</label><input type="text" id="v004"></div>
            <div class="field"><label>MUNICIPIO (005)</label><input type="text" id="v005"></div>
            <div class="field"><label>LOCALIDAD (006)</label><input type="text" id="v006"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">2. CONDICIÓN GENERAL DEL PUENTE</div>
        <div class="row">
            <div class="field">
                <label>HUNDIMIENTO (004)</label>
                <select id="v004_c">
                    <option value="4">4.- No se aprecia</option>
                    <option value="1">1.- Ligero</option>
                    <option value="2">2.- Moderado</option>
                    <option value="3">3.- Grave</option>
                    <option value="5">5.- No aplica</option>
                </select>
            </div>
            <div class="field">
                <label>SOCAVACIÓN (006)</label>
                <select id="v006_c">
                    <option value="4">4.- No se aprecia</option>
                    <option value="3">3.- Grave</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="field"><label>COMENTARIOS (013)</label><textarea id="v013" rows="4"></textarea></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">3. SUPERFICIE DE RODAMIENTO</div>
        <div class="row">
            <div class="field">
                <label>CONDICIÓN (014)</label>
                <select id="v014">
                    <option>1.- Buena</option>
                    <option>2.- Regular</option>
                    <option>3.- Mala</option>
                </select>
            </div>
            <div class="field"><label>ESPESOR CARPETA (cm) (015)</label><input type="number" id="v015"></div>
        </div>
    </div>
</div>

<button class="btn-float" onclick="saveData()">GUARDAR Y CONTINUAR</button>

<script>
    function saveData() {
        const data = {
            folio: localStorage.getItem('currentFolio'),
            p002: document.getElementById('v002').value,
            // Aquí se agregan todos los campos v001...v073
        };
        localStorage.setItem('form_data_' + data.folio, JSON.stringify(data));
        alert("Página guardada localmente. Proceda a la carga de fotos.");
        location.href = "inspeccion.html";
    }
</script>
</body>
</html>
