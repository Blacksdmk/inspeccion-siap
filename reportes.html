<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SIAP - Reporte de Inspección Técnica</title>
    <style>
        /* CONFIGURACIÓN Y MAQUETACIÓN PARA IMPRESIÓN ASOCIADA */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #525659;
            color: #333;
            padding: 20px;
            font-size: 11px;
        }
        
        /* Panel de control superior (No se imprime) */
        #panel-control {
            max-width: 800px;
            margin: 0 auto 20px auto;
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .btn-accion {
            padding: 8px 15px;
            font-size: 12px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-print { background: #27ae60; color: white; }
        .btn-back { background: #2980b9; color: white; text-decoration: none; padding: 8px 15px; border-radius: 4px; font-size: 12px; font-weight: bold;}
        select { padding: 6px; font-size: 12px; width: 350px; }

        /* Contenedor del Reporte Físico (Formato Losa de Impresión A4/Carta) */
        #reporteContenido {
            width: 100%;
        }
        .page {
            width: 215.9mm; /* Ancho Carta estándar */
            min-height: 279.4mm; /* Alto Carta estándar */
            padding: 15mm 12mm;
            margin: 0 auto 20px auto;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            position: relative;
            page-break-after: always;
        }

        /* Cabeceras de Reporte Vial */
        .header-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
        }
        .header-table td {
            border: 1px solid #000;
            padding: 6px;
            text-align: center;
            vertical-align: middle;
        }
        .logo-space {
            width: 22%;
        }
        .title-space {
            width: 48%;
            font-size: 11px;
            font-weight: bold;
            line-height: 1.3;
        }
        .meta-space {
            width: 30%;
            text-align: left !important;
            font-size: 10px;
            line-height: 1.4;
        }

        /* Secciones y Bloques */
        .section-header {
            background: #4a5568;
            color: #ffffff;
            padding: 5px 8px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
            border: 1px solid #000;
        }
        .grid-2 {
            display: table;
            width: 100%;
            table-layout: fixed;
            margin-bottom: 10px;
        }
        .col {
            display: table-cell;
            width: 50%;
            vertical-align: top;
            padding: 0 4px;
        }
        .field-box {
            border: 1px solid #a0aec0;
            margin-bottom: 6px;
            background: #f7fafc;
        }
        .field-label {
            background: #e2e8f0;
            padding: 3px 6px;
            font-size: 9px;
            font-weight: bold;
            color: #2d3748;
            border-bottom: 1px solid #a0aec0;
        }
        .field-value {
            padding: 4px 6px;
            font-size: 10px;
            color: #000;
            min-height: 18px;
            word-wrap: break-word;
        }

        /* Estructuras multimedia del catálogo */
        .photo-container {
            border: 1px solid #000;
            padding: 6px;
            background: #fff;
            text-align: center;
            margin-bottom: 10px;
        }
        .photo-box {
            width: 100%;
            height: 200px;
            object-fit: contain;
            background: #f1f2f6;
            border: 1px solid #ccc;
            display: block;
            margin-bottom: 5px;
        }

        /* Pie de página rígido para control de folios */
        .page-footer {
            position: absolute;
            bottom: 15mm;
            left: 12mm;
            right: 12mm;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #000;
            padding-top: 5px;
            font-size: 9px;
            font-weight: bold;
        }

        /* CONFIGURACIÓN EXCLUSIVA PARA IMPRESORA / PDF */
        @media print {
            body {
                background: none;
                padding: 0;
            }
            #panel-control {
                display: none;
            }
            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>

    <div id="panel-control">
        <div>
            <a href="inspeccion.html" class="btn-back">⬅️ Volver al Formulario</a>
        </div>
        <div>
            <label style="font-weight: bold; font-size: 13px; margin-right: 8px;">Seleccionar Inspección Realizada:</label>
            <select id="selector-folios" onchange="cargarReportePorFolio(this.value)"></select>
        </div>
        <div>
            <button class="btn-accion btn-print" onclick="window.print()">🖨️ Descargar / Imprimir PDF</button>
        </div>
    </div>

    <div id="reporteContenido"></div>

    <script>
        // Sincronización estricta del diccionario de proyectos maestros
        const CONFIG_PROYECTOS = {
            "LIPSA": { prefijo: "LIPSA", nombre: "LIBRAMIENTO ICA LA PIEDAD (LIPSA)" },
            "PALMILLAS": { prefijo: "PALM", nombre: "CONCESIONARIA DE INFRAESTRUCTURA DE PALMILLAS" },
            "QUERÉTARO": { prefijo: "PALM", nombre: "CONCESIONARIA DE INFRAESTRUCTURA DE PALMILLAS" },
            "RIOVERDE": { prefijo: "RIVE", nombre: "AUTOPISTA RÍO VERDE - CIUDAD VALLES" },
            "RÍO VERDE": { prefijo: "RIVE", nombre: "AUTOPISTA RÍO VERDE - CIUDAD VALLES" },
            "MAYAB TRONCAL": { prefijo: "MAY-T", nombre: "AUTOPISTA DEL MAYAB - TRONCAL" },
            "MAYAB RAMAL": { prefijo: "MAY-R", nombre: "AUTOPISTA DEL MAYAB - RAMAL" },
            "MAXITÚNEL": { prefijo: "MAXI", nombre: "MAXITÚNEL ACAPULCO" },
            "ACAPULCO": { prefijo: "MAXI", nombre: "MAXITÚNEL ACAPULCO" },
            "SALAMANCA": { prefijo: "SALE", nombre: "AUTOPISTA SALAMANCA - LEÓN" }
        };

        document.addEventListener("DOMContentLoaded", function() {
            inicializarPanelReportes();
        });

        function inicializarPanelReportes() {
            const selector = document.getElementById('selector-folios');
            selector.innerHTML = "";
            
            let encontrados = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const llave = localStorage.key(i);
                if (llave.startsWith('siap_folio_')) {
                    try {
                        const datos = JSON.parse(localStorage.getItem(llave));
                        const option = document.createElement('option');
                        option.value = datos.folio;
                        // Mostrar proyecto e ID por separado para mitigar colisiones visuales de IDs idénticos
                        const projLabel = datos.proyecto ? datos.proyecto : "SIAP";
                        option.text = `[${projLabel}] Folio: ${datos.folio} - ID Puente: ${datos.puenteId} (${datos.nombrePuente || 'Sin Nombre'})`;
                        selector.appendChild(option);
                        encontrados++;
                    } catch(e) {
                        console.error("Error al parsear clave de almacenamiento local: " + llave);
                    }
                }
            }

            if (encontrados === 0) {
                document.getElementById('reporteContenido').innerHTML = `
                    <div class="page" style="text-align:center; padding-top:100px;">
                        <h2>No se encontraron formularios guardados en LocalStorage.</h2>
                        <p style="margin-top:15px; font-size:13px; color:#7f8c8d;">Regresa a la pestaña de inspección, selecciona tu proyecto, llena los datos y presiona "Guardar Registro General".</p>
                    </div>`;
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const folioUrl = urlParams.get('folio');
            
            if (folioUrl && localStorage.getItem('siap_folio_' + folioUrl)) {
                selector.value = folioUrl;
                cargarReportePorFolio(folioUrl);
            } else {
                cargarReportePorFolio(selector.options[0].value);
            }
        }

        function cargarReportePorFolio(folio) {
            const rawData = localStorage.getItem('siap_folio_' + folio);
            if (!rawData) return;
            
            const data = JSON.parse(rawData);
            
            const cG = data.condicionGeneral || {};
            const sR = data.superficieRodamiento || {};
            const sC = data.superestructuraConcreto || {};
            const subC = data.substructureConcreto || data.subestructuraConcreto || {}; 
            const cP = data.concretoPresforzado || {};
            const calif = data.calificacionGeneral || {};
            const rG = data.recomendacionesGenerales || {};

            const proyectoActivo = data.proyecto || "LIPSA";
            const nombreOficial = (CONFIG_PROYECTOS[proyectoActivo.toUpperCase()] || { nombre: "SISTEMA DE ADMINISTRACIÓN DE PUENTES" }).nombre;
            
            let bannerLogoHtml = "";
            let logoBase64 = "";

            // =========================================================================
            // INYECCIÓN DE CADENAS DE TEXTO BASE64 REALES POR CONCESIÓN
            // =========================================================================
            // =========================================================================
// INYECCIÓN DE CADENAS DE TEXTO BASE64 REALES POR CONCESIÓN (CORREGIDO)
// =========================================================================
const proyectoNormalizado = (data.proyecto || "").toUpperCase().trim();

// 1. Validar si el proyecto seleccionado existe en la configuración maestra
if (CONFIG_PROYECTOS[proyectoNormalizado]) {
    // Asignar el nombre del proyecto activo de forma dinámica
    const nombreOficial = CONFIG_PROYECTOS[proyectoNormalizado].nombre;
    
    switch (proyectoNormalizado) {
        case "LIPSA":
            logoBase64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAScAAABcCAY...[Cadena_Base64_Lipsa]...";
            bannerLogoHtml = `<img src="${logoBase64}" style="max-width:100%; max-height:55px; object-fit:contain; display:block; margin:0 auto;">`;
            break;
            
        case "MAYAB TRONCAL":
        case "MAYAB RAMAL":
            logoBase64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAATIAAABWCAY...[Cadena_Base64_Mayab]...";
            const vertiente = proyectoNormalizado.includes("TRONCAL") ? "TRONCAL" : "RAMAL";
            bannerLogoHtml = `<div style="text-align:center;"><img src="${logoBase64}" style="max-width:100%; max-height:45px; object-fit:contain; display:block; margin:0 auto;"><span style="font-size:8px; font-weight:bold; color:#27ae60;">${vertiente}</span></div>`;
            break;
            
        case "QUERÉTARO":
        case "PALMILLAS":
            logoBase64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAATEAAABmCAY...[Cadena_Base64_Palmillas]...";
            bannerLogoHtml = `<img src="${logoBase64}" style="max-width:100%; max-height:55px; object-fit:contain; display:block; margin:0 auto;">`;
            break;
            
        default:
            // Bloque de contingencia genérico si no se dispone del Base64 del logo
            bannerLogoHtml = `
                <div style="border: 2px solid #4a5568; padding: 4px; border-radius: 4px; background: #fff; width: 100%; display: inline-block;">
                    <div style="background: #4a5568; color: #fff; font-weight: 900; font-size: 11px; padding: 5px; border-radius: 2px; text-align: center; text-transform: uppercase;">
                        ${CONFIG_PROYECTOS[proyectoNormalizado].prefijo}
                    </div>
                </div>`;
            break;
    }
} else {
    // 2. Si el proyecto es indefinido o vacío ("SIAP"), se genera un banner de texto estructurado libre de logos fijos
    bannerLogoHtml = `
        <div style="border: 2px solid #1a252f; padding: 4px; border-radius: 4px; background: #fff; width: 100%; display: inline-block;">
            <div style="background: #1a252f; color: #fff; font-weight: 900; font-size: 12px; padding: 5px; border-radius: 2px; text-align: center;">SIAP</div>
            <div style="font-size: 7px; color: #1a252f; font-weight: bold; margin-top: 2px; text-transform: uppercase; text-align: center;">INSPECCIÓN TÉCNICA</div>
        </div>`;
}
                    
                default:
                    bannerLogoHtml = `<div style="background: #7f8c8d; color: #fff; font-weight: bold; padding: 8px; border-radius: 4px; text-align: center;">SIAP</div>`;
            }

            let htmlHTML = "";

            // PÁGINA 1
            htmlHTML += `
            <div class="page">
                <table class="header-table">
                    <tr>
                        <td class="logo-space">${bannerLogoHtml}</td>
                        <td class="title-space">SISTEMA DE INVENTARIO DE LA INFRAESTRUCTURA VIAL<br>REPORTE DE INSPECCIÓN TÉCNICA CONSOLIDADO</td>
                        <td class="meta-space"><b>FOLIO:</b> ${data.folio || 'N/A'}<br><b>FECHA:</b> ${data.fecha || 'N/A'}</td>
                    </tr>
                </table>
                
                <div class="section-header">1. Identificación del Elemento Estructural</div>
                <div class="grid-2">
                    <div class="col">
                        <div class="field-box"><div class="field-label">ID DEL PUENTE / PROYECTO COMPUESTO (v003)</div><div class="field-value"><b>${data.puenteId || 'N/A'}</b></div></div>
                        <div class="field-box"><div class="field-label">NOMBRE DEL PUENTE (v002)</div><div class="field-value">${data.nombrePuente || 'No especificado'}</div></div>
                    </div>
                    <div class="col">
                        <div class="field-box"><div class="field-label">CONCESIÓN ASOCIADA</div><div class="field-value"><b>${nombreOficial}</b></div></div>
                        <div class="field-box"><div class="field-label">ESTATUS DE REVISIÓN</div><div class="field-value">${data.aprobado ? '✔️ APROBADO / VALIDADO' : '⏳ PENDIENTE DE REVISIÓN'}</div></div>
                    </div>
                </div>

                <div class="section-header">2. Condición General del Puente</div>
                <div class="grid-2">
                    <div class="col">
                        <div class="field-box"><div class="field-label">(004) HUNDIMIENTO</div><div class="field-value">${cG.hundimiento || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(005) DESPLOME</div><div class="field-value">${cG.desplome || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(006) SOCAVACIÓN</div><div class="field-value">${cG.socavacion || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(007) FLECHAS</div><div class="field-value">${cG.flechas || '4.-No se aprecia'}</div></div>
                    </div>
                    <div class="col">
                        <div class="field-box"><div class="field-label">(008) CORROSIÓN</div><div class="field-value">${cG.corrosion || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(010) CAUCE DE RÍO</div><div class="field-value">${cG.cauceRio || '5.- No aplica'}</div></div>
                        <div class="field-box"><div class="field-label">(011) INDICACIÓN DE GÁLIBOS</div><div class="field-value">${cG.indicaGalibos || 'NO'}</div></div>
                        <div class="field-box"><div class="field-label">(012) SEÑALIZACIÓN DE SEGURIDAD</div><div class="field-value">${cG.senalizacionSeguridad || 'SI'}</div></div>
                    </div>
                </div>
                <div class="field-box" style="margin-top:-4px;"><div class="field-label">(013) COMENTARIOS ADICIONALES</div><div class="field-value">${cG.comentarios || 'Sin comentarios registrados.'}</div></div>

                <div class="section-header">3. Superficie de Rodamiento</div>
                <div class="grid-2">
                    <div class="col">
                        <div class="field-box"><div class="field-label">(014) CONDICIÓN GENERAL</div><div class="field-value">${sR.condicion || '1.-Buena'}</div></div>
                    </div>
                    <div class="col">
                        <div class="field-box"><div class="field-label">(015) ESPESOR DE CARPETA (cm)</div><div class="field-value">${sR.espesorCarpeta || '---'} cm</div></div>
                    </div>
                </div>
                <div class="field-box" style="margin-top:-4px;"><div class="field-label">(016) COMENTARIOS</div><div class="field-value">${sR.comentarios || 'Sin comentarios.'}</div></div>

                <div class="page-footer"><span>SIAP - REPORTE DE INFRAESTRUCTURA</span><span>PÁGINA 1</span></div>
            </div>`;

            // PÁGINA 2
            htmlHTML += `
            <div class="page">
                <table class="header-table">
                    <tr>
                        <td class="logo-space">${bannerLogoHtml}</td>
                        <td class="title-space">SISTEMA DE INVENTARIO DE LA INFRAESTRUCTURA VIAL<br>REPORTE DE INSPECCIÓN TÉCNICA CONSOLIDADO</td>
                        <td class="meta-space"><b>FOLIO:</b> ${data.folio || 'N/A'}<br><b>ID:</b> ${data.puenteId || 'N/A'}</td>
                    </tr>
                </table>

                <div class="section-header">4. Superestructura de Concreto</div>
                <div class="grid-2">
                    <div class="col">
                        <div class="field-box"><div class="field-label">(017) AGRIETAMIENTO EN ZONA DE APOYOS</div><div class="field-value">${sC.agrietamientoApoyos || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(018) AGRIETAMIENTO EN EL CLARO</div><div class="field-value">${sC.agrietamientoClaro || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(019) AGRIETAMIENTO EN LOSAS</div><div class="field-value">${sC.agrietamientoLosas || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(021) JUNTAS DE EXPANSIÓN</div><div class="field-value">${sC.juntasExpansion || '1.-Buen estado'}</div></div>
                    </div>
                    <div class="col">
                        <div class="field-box"><div class="field-label">(022) DISPOSITIVOS DE APOYO</div><div class="field-value">${sC.dispositivosApoyo || '1.-Buen estado'}</div></div>
                        <div class="field-box"><div class="field-label">(023) IMPACTO DE GÁLIBO</div><div class="field-value">${sC.impactoGalibo || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(025) DRENAJE</div><div class="field-value">${sC.drenaje || '4.-No se aprecia'}</div></div>
                        <div class="field-box"><div class="field-label">(026) DESCONCHAMIENTO STRUCTURAL</div><div class="field-value">${sC.desconchamiento || '4.-No se aprecia'}</div></div>
                    </div>
                </div>

                <div class="section-header">5. Subestructura de Concreto</div>
                <div class="grid-2">
                    <div class="col">
                        <div class="field-box"><div class="field-label">(030) AGRIETAMIENTO EN CABALLETES EXTREMOS</div><div class="field-value">${subC.agrietamientoCaballetesExtremos || '4.-No se aprecia'}</div></div>
                    </div>
                    <div class="col">
                        <div class="field-box"><div class="field-label">(031) AGRIETAMIENTO EN CABALLETES INTERMEDIOS / PILAS</div><div class="field-value">${subC.agrietamientoCaballetesIntermedios || '4.-No se aprecia'}</div></div>
                    </div>
                </div>

                <div class="section-header">7. Puentes de Concreto Presforzado</div>
                <div class="grid-2">
                    <div class="col">
                        <div class="field-box"><div class="field-label">(050) DUCTOS O CABLES EXPUESTOS</div><div class="field-value">${cP.supDuctosCables || 'NO'}</div></div>
                        <div class="field-box"><div class="field-label">(052) CABLES ROTOS</div><div class="field-value">${cP.supCablesRotos || 'NO'}</div></div>
                    </div>
                    <div class="col">
                        <div class="field-box"><div class="field-label">(054) CORROSIÓN EN CABLES</div><div class="field-value">${cP.supCorrosionCables || 'NO'}</div></div>
                        <div class="field-box"><div class="field-label">(055) COMENTARIO GENERAL</div><div class="field-value">${cP.supComentarioGeneral || 'Sin novedad.'}</div></div>
                    </div>
                </div>

                <div class="section-header">8. Calificación General e Índice de Daño</div>
                <div class="grid-2">
                    <div class="col">
                        <table style="width:100%; border-collapse:collapse; font-size:10px;">
                            <tr><td style="padding:4px; border:1px solid #cbd5e0; background:#edf2f7;">SOCAVACIÓN</td><td style="padding:4px; border:1px solid #cbd5e0; text-align:center;"><b>${calif.socavacion || '4'}</b></td></tr>
                            <tr><td style="padding:4px; border:1px solid #cbd5e0; background:#edf2f7;">CIMENTACIÓN</td><td style="padding:4px; border:1px solid #cbd5e0; text-align:center;"><b>${calif.cimentacion || '4'}</b></td></tr>
                            <tr><td style="padding:4px; border:1px solid #cbd5e0; background:#edf2f7;">APOYOS</td><td style="padding:4px; border:1px solid #cbd5e0; text-align:center;"><b>${calif.apoyos || '4'}</b></td></tr>
                            <tr><td style="padding:4px; border:1px solid #cbd5e0; background:#edf2f7;">PILAS / CABALLETES</td><td style="padding:4px; border:1px solid #cbd5e0; text-align:center;"><b>${calif.pilas || '4'}</b></td></tr>
                        </table>
                    </div>
                    <div class="col">
                        <table style="width:100%; border-collapse:collapse; font-size:10px;">
                            <tr><td style="padding:4px; border:1px solid #cbd5e0; background:#edf2f7;">SISTEMA DE PISO</td><td style="padding:4px; border:1px solid #cbd5e0; text-align:center;"><b>${calif.sistemaPiso || '4'}</b></td></tr>
                            <tr><td style="padding:4px; border:1px solid #cbd5e0; background:#edf2f7;">VIGAS / DIAFRAGMAS</td><td style="padding:4px; border:1px solid #cbd5e0; text-align:center;"><b>${calif.vigasDiafragmas || '4'}</b></td></tr>
                            <tr><td style="padding:4px; border:1px solid #cbd5e0; background:#edf2f7;">DISPOSITIVOS DE EXP.</td><td style="padding:4px; border:1px solid #cbd5e0; text-align:center;"><b>${calif.dispositivosApoyo || '4'}</b></td></tr>
                            <tr style="background:#e2e8f0; font-weight:bold;"><td style="padding:4px; border:1px solid #000;">PROMEDIO GENERAL ÍNDICE</td><td style="padding:4px; border:1px solid #000; text-align:center; font-size:12px; color:#c0392b;">${calif.totalCalculado || '4.00'}</td></tr>
                        </table>
                    </div>
                </div>

                <div class="section-header">9. Recomendaciones Generales de Intervención</div>
                <div class="grid-2">
                    <div class="col">
                        <div class="field-box"><div class="field-label">(069) RECOMENDACIÓN DE INSPECCIONES</div><div class="field-value">${rG.inspecciones || 'Ninguna'}</div></div>
                        <div class="field-box"><div class="field-label">(071) ACCIONES EN SUPERESTRUCTURA</div><div class="field-value">${rG.superestructura || 'Ninguna'}</div></div>
                    </div>
                    <div class="col">
                        <div class="field-box"><div class="field-label">(070) ACCIONES EN RODAMIENTO</div><div class="field-value">${rG.superficieRodamiento || 'Ninguna'}</div></div>
                        <div class="field-box"><div class="field-label">(072) ACCIONES EN SUBESTRUCTURA</div><div class="field-value">${rG.subestructura || 'Ninguna'}</div></div>
                    </div>
                </div>

                <div class="page-footer"><span>SIAP - REPORTE DE INFRAESTRUCTURA</span><span>PÁGINA 2</span></div>
            </div>`;

            // =========================================================================
            // GENERADOR DE HOJAS FOTOGRÁFICAS DINÁMICAS (DE 2 EN 2, MÁXIMO 6 POR HOJA)
            // =========================================================================
            const listaFotos = data.catalogoFotosDinamicas || [];
            
            if (listaFotos.length === 0) {
                htmlHTML += `
                <div class="page">
                    <table class="header-table"><tr><td class="logo-space">${bannerLogoHtml}</td><td class="title-space">CATÁLOGO FOTOGRÁFICO DE CAMPO</td><td class="meta-space"><b>FOLIO:</b> ${data.folio || 'N/A'}</td></tr></table>
                    <div class="section-header">10. Catálogo Fotográfico de Daños y Defectos</div>
                    <p style="text-align:center; margin-top:100px; font-style:italic; color:#7f8c8d; font-size:13px;">No se anexó evidencia fotográfica en esta inspección estructural.</p>
                    <div class="page-footer"><span>SIAP - CATALOGO FOTOGRÁFICO</span><span>PÁGINA 3</span></div>
                </div>`;
            } else {
                const maxFotosPorHoja = 6;
                let fotosEnHojaActual = 0;
                let numeroPaginaFotografica = 3;

                htmlHTML += `
                <div class="page">
                    <table class="header-table"><tr><td class="logo-space">${bannerLogoHtml}</td><td class="title-space">CATÁLOGO FOTOGRÁFICO DE CAMPO<br><b>${proyectoActivo.toUpperCase()}</b></td><td class="meta-space"><b>FOLIO:</b> ${data.folio || 'N/A'}</td></tr></table>
                    <div class="section-header">10. Catálogo Fotográfico de Daños y Defectos</div>
                    <div style="display: block; width: 100%;">`;

                for (let i = 0; i < listaFotos.length; i += 2) {
                    if (fotosEnHojaActual >= maxFotosPorHoja) {
                        htmlHTML += `
                            </div>
                            <div class="page-footer"><span>SIAP - CATALOGO FOTOGRÁFICO</span><span>PÁGINA ${numeroPaginaFotografica}</span></div>
                        </div>
                        <div class="page">
                            <table class="header-table">
                                <tr>
                                    <td class="logo-space">${bannerLogoHtml}</td>
                                    <td class="title-space">CATÁLOGO FOTOGRÁFICO DE CAMPO (CONTINUACIÓN)</td>
                                    <td class="meta-space"><b>FOLIO:</b> ${data.folio || 'N/A'}<br><b>ID:</b> ${data.puenteId || 'N/A'}</td>
                                </tr>
                            </table>
                            <div class="section-header">10. Catálogo Fotográfico de Campo (Continuación)</div>
                            <div style="display: block; width: 100%;">`;
                        
                        fotosEnHojaActual = 0;
                        numeroPaginaFotografica++;
                    }

                    const fotoIzquierda = listaFotos[i];
                    const fotoDerecha = listaFotos[i + 1]; 

                    htmlHTML += `<div class="grid-2">`;
                    
                    if (fotoIzquierda && fotoIzquierda.data) {
                        htmlHTML += `
                            <div class="col">
                                <div class="photo-container">
                                    <img class="photo-box" src="${fotoIzquierda.data}" alt="Evidencia">
                                    <div class="field-value" style="border:1px solid #a0aec0; background:#f7fafc; text-align:left; min-height:38px; padding:4px;"><b>Obs:</b> ${fotoIzquierda.obs}</div>
                                </div>
                            </div>`;
                    }
                    fotosEnHojaActual++;

                    if (fotoDerecha && fotoDerecha.data) {
                        htmlHTML += `
                            <div class="col">
                                <div class="photo-container">
                                    <img class="photo-box" src="${fotoDerecha.data}" alt="Evidencia">
                                    <div class="field-value" style="border:1px solid #a0aec0; background:#f7fafc; text-align:left; min-height:38px; padding:4px;"><b>Obs:</b> ${fotoDerecha.obs}</div>
                                </div>
                            </div>`;
                    } else {
                        htmlHTML += `<div class="col"></div>`;
                    }
                    fotosEnHojaActual++;

                    htmlHTML += `</div>`;
                }

                htmlHTML += `
                    </div>
                    <div class="page-footer"><span>SIAP - CATALOGO FOTOGRÁFICO</span><span>PÁGINA ${numeroPaginaFotografica}</span></div>
                </div>`;
            }

            document.getElementById('reporteContenido').innerHTML = htmlHTML;
        }
    </script>
</body>
</html>
